<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="auth-box">

            <h1>User Management</h1>
            <p class="subtitle">Professional Admin Dashboard</p>

            <div class="tabs">
                <button type="button" id="loginTab" class="active">Login</button>
                <button type="button" id="registerTab">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">

                <input type="email" id="loginEmail" placeholder="Enter Email" required>

                <input type="password" id="loginPassword" placeholder="Enter Password" required>

                <button type="submit" class="btn">Login</button>

            </form>


            <!-- Register Form -->
            <form id="registerForm" class="hidden">

                <input type="text" id="registerName" placeholder="Full Name" required>

                <input type="email" id="registerEmail" placeholder="Email" required>

                <input type="password" id="registerPassword" placeholder="Password" required>

                <button type="submit" class="btn">Create Account</button>

            </form>

            <p id="message"></p>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
